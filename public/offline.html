<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d4ed8" />
    <title>Tidak Ada Koneksi — Bepadah</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: white;
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,.08);
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: #eff6ff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg { width: 40px; height: 40px; color: #1d4ed8; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .75rem; }
      p { font-size: .95rem; color: #64748b; line-height: 1.6; margin-bottom: 2rem; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        background: #1d4ed8;
        color: white;
        border: none;
        border-radius: .75rem;
        padding: .75rem 1.5rem;
        font-size: .95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background .15s;
        text-decoration: none;
      }
      .btn:hover { background: #1e40af; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: .375rem;
        margin-top: 1.5rem;
        font-size: .8rem;
        color: #94a3b8;
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
      .dot.online { background: #22c55e; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
        </svg>
      </div>
      <h1>Tidak Ada Koneksi</h1>
      <p>
        Anda sedang offline. Periksa koneksi internet Anda, lalu coba muat ulang halaman.
        Beberapa halaman yang pernah Anda kunjungi mungkin masih tersedia.
      </p>
      <button class="btn" onclick="window.location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Muat Ulang
      </button>
      <div class="badge">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Memeriksa koneksi…</span>
      </div>
    </div>

    <script>
      function updateStatus() {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        if (navigator.onLine) {
          dot.classList.add('online');
          text.textContent = 'Koneksi tersedia — klik Muat Ulang';
        } else {
          dot.classList.remove('online');
          text.textContent = 'Masih offline…';
        }
      }
      updateStatus();
      window.addEventListener('online', updateStatus);
      window.addEventListener('offline', updateStatus);
    </script>
  </body>
</html>
