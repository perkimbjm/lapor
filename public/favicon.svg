<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Road surface -->
  <rect x="160" y="200" width="192" height="112" rx="8" fill="#e2e8f0"/>
  <!-- Center line dashes -->
  <rect x="236" y="240" width="40" height="10" rx="5" fill="#f59e0b"/>
  <!-- Road marking left -->
  <rect x="168" y="240" width="40" height="10" rx="5" fill="#94a3b8"/>
  <!-- Road marking right -->
  <rect x="304" y="240" width="40" height="10" rx="5" fill="#94a3b8"/>
  <!-- Shield shape -->
  <path d="M256 100 L340 136 L340 220 Q340 280 256 310 Q172 280 172 220 L172 136 Z"
        fill="none" stroke="white" stroke-width="12" opacity="0.9"/>
  <!-- Checkmark inside shield -->
  <polyline points="218,212 246,240 298,188"
            fill="none" stroke="white" stroke-width="16"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom text base -->
  <rect x="140" y="340" width="232" height="6" rx="3" fill="white" opacity="0.3"/>
  <!-- Dots representing map pins -->
  <circle cx="180" cy="380" r="12" fill="#f59e0b"/>
  <circle cx="256" cy="368" r="12" fill="#f59e0b"/>
  <circle cx="332" cy="380" r="12" fill="#f59e0b"/>
  <!-- Connection lines -->
  <line x1="180" y1="380" x2="256" y2="368" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="368" x2="332" y2="380" stroke="white" stroke-width="4" opacity="0.6"/>
</svg>
